<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Chatbot Homepage</title>
</head>
<body>
    <section id="home-panel" style="flex: 1; text-align: center; max-width: 600px; margin: 50px auto;">
        <h1>AI Chatbot Project</h1>
        <hr>
        <div class="card" style="margin-top: 20px; padding: 20px;">
            <p>Welcome! This interactive chatbot allows you to ask questions and get context-aware answers using the OpenAI API.</p>
            
            <div style="margin-top: 20px;">
                <label for="participant-id"><strong>Participant ID:</strong></label><br><br>
                <input type="text" id="participant-id" placeholder="Enter ID here" style="padding: 8px; width: 60%; border: 1px solid #ccc; border-radius: 4px;" />
            </div>
            
            <br>
            <button id="start-btn">Join Chat</button>
        </div>
    </section>

    <script>
        document.getElementById('start-btn').addEventListener('click', () => {
            const partId = document.getElementById('participant-id').value.trim();
            if (partId) {
                localStorage.setItem('participantID', partId);
                const systemID = parseInt(partId) % 2 === 1 ? 1 : 2;
                window.location.href = `/study-workflow.html?participantID=${partId}&systemID=${systemID}`;
            } else {
                alert('Please enter a Participant ID.');
            }
        });
    </script>
</body>
</html>

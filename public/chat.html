<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>chatbot</title>
</head>
    <body>
        <!-- Left panel: Document Management -->
        <section id="doc-panel">
            <h1>Document Management</h1>
            <hr>

            <div class="card" id="upload-form">
                <h2>Upload Document</h2>
                <input type="file" id="file-input" accept=".txt,.pdf,.md"/>
                <button id="upload-btn">Upload</button>
                <p id="upload-status" class="status-msg"></p>
            </div>

            <div id="uploaded-docs">
                <h2>Uploaded Documents</h2>
                <ul id="doc-list">
                    <li class="no-docs">No documents uploaded yet</li>
                </ul>
            </div>

            <div class="card" id="retrieval-card">
                <h2>Retrieval Method</h2>
                <select id="retrieval-method">
                    <option value="semantic">Semantic (Embeddings)</option>
                    <option value="tfidf">TF-IDF (Keyword)</option>
                </select>
            </div>
        </section>

        <!-- Middle panel: Chat -->
        <section id="chat-container">
            <h1>AI Chat</h1>
            <hr>
            <div class="card" id="messages"></div>
            <div id="input-area">
                <textarea name="user-input" id="user-input" placeholder="Type a message..."></textarea>
                <button id="send-btn">Send</button>
            </div>
        </section>

        <!-- Right panel: Evidence & Confidence -->
        <section id="evidence-panel">
            <h1>Evidence &amp; Confidence</h1>
            <hr>

            <div class="card" id="confidence-card">
                <h2>Confidence Score</h2>
                <div id="confidence-display">
                    <p class="no-data">Send a message to see confidence.</p>
                </div>
            </div>

            <div id="evidence-section">
                <h2>Retrieved Evidence</h2>
                <div id="evidence-items">
                    <p class="no-data">No evidence retrieved yet.</p>
                </div>
            </div>
        </section>

        <script src="script.js"></script>
    </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Study Workflow</title>
</head>
<body>
    <section id="home-panel" style="flex: 1; text-align: center; max-width: 600px; margin: 50px auto;">
        <h1>Study Workflow</h1>
        <hr>
        <div class="card" style="margin-top: 20px; padding: 20px;">
            <p>Please complete the following steps <strong>in order</strong>.</p>
            <ol id="workflow-list" style="text-align: left; padding-left: 0; list-style: none; margin-top: 16px;">

                <li class="step-item">
                    <div class="step-row">
                        <button id="survey-btn" class="workflow-btn" type="button">
                            1. Complete the demographics questionnaire
                        </button>
                        <span class="step-check" id="check-demographics">&#10003;</span>
                    </div>
                </li>

                <li class="step-item">
                    <div class="step-row">
                        <button id="pretask-btn" class="workflow-btn" type="button">
                            2. Complete the pre-task questionnaire
                        </button>
                        <span class="step-check" id="check-pretask">&#10003;</span>
                    </div>
                </li>

                <li class="step-item">
                    <div class="step-row">
                        <button id="task-btn" class="workflow-btn" type="button">
                            3. Read the task
                        </button>
                        <span class="step-check" id="check-task">&#10003;</span>
                    </div>
                </li>

                <li class="step-item">
                    <div class="step-row">
                        <button id="prototype-btn" class="workflow-btn" type="button">
                            4. Use the AI system to complete the task
                        </button>
                        <span class="step-check" id="check-prototype">&#10003;</span>
                    </div>
                </li>

                <li class="step-item">
                    <div class="step-row">
                        <button id="posttask-btn" class="workflow-btn" type="button">
                            5. Complete the post-task questionnaire
                        </button>
                        <span class="step-check" id="check-posttask">&#10003;</span>
                    </div>
                </li>

            </ol>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Thank You</title>
</head>
<body>
    <section id="home-panel" style="flex: 1; max-width: 600px; margin: 50px auto; text-align: center;">
        <h1>Thank You!</h1>
        <hr>
        <div class="card" style="margin-top: 20px; padding: 30px;">
            <div style="font-size: 3rem; margin-bottom: 16px; color: #1a7a1a;">&#10003;</div>
            <h2 style="font-size: 1.3rem; color: #333; margin-bottom: 12px;">You have completed the study.</h2>
            <p style="color: #555; line-height: 1.6; margin-bottom: 16px;">
                Thank you for your participation. Your responses have been recorded and will contribute to research on human-centered AI systems.
            </p>
            <p style="color: #888; font-size: 0.88rem;">
                You may now close this window.
            </p>
        </div>
    </section>

    <script>
        const params        = new URLSearchParams(window.location.search);
        const participantID = params.get('participantID') || localStorage.getItem('participantID');
        const completed     = params.get('completed');
        if (completed && participantID) {
            localStorage.setItem(`${participantID}_step_${completed}`, 'done');
        }
    </script>
</body>
</html>
